name: Scrape completo (self-hosted) y publicar

# Corre en el self-hosted runner (tu PC, IP residencial chilena) -> scrapea
# las 13 tiendas SIN bloqueo WAF, congela el histórico inmutable (Capa 1) y
# publica el sitio. Es la corrida "primaria": cuando el PC está encendido,
# refresca las 13 y hace crecer historia/. El workflow en la nube (scrape.yml)
# queda como respaldo para las 8 tiendas que sí pasan desde datacenter.
#
# Nota: el runner es Windows; los pasos usan PowerShell (pwsh) porque bash no
# está garantizado en el PATH del runner.
on:
  schedule:
    - cron: "0 10 * * *"   # 1x/día; solo se ejecuta si el runner está online
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: powershell

jobs:
  build:
    runs-on: [self-hosted, self-hosted-cl]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: python -m pip install --quiet --disable-pip-version-check "requests>=2.31"

      - name: Correr scraper (13 tiendas)
        run: python run.py

      - name: Verificar que el sitio tiene datos
        run: python tools/verificar_sitio.py 5000

      - name: Commit histórico + datos del sitio
        run: |
          git config user.name "ofertas-bot"
          git config user.email "actions@github.com"
          git add historia/ site/data/ data/ofertas.csv
          $staged = git diff --cached --name-only
          if (-not $staged) {
            Write-Host "Sin cambios."
          } else {
            $fecha = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm")
            git commit -m "datos: corrida local completa $fecha UTC"
            git push
          }

      - name: Habilitar GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
